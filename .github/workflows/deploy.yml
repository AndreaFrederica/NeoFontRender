name: Build and Deploy

on:
  workflow_dispatch:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'

jobs:
  cosmic-native:
    name: Cosmic ${{ matrix.resource }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: windows-latest
            target: x86_64-pc-windows-msvc
            resource: windows-x86_64
            library: neofontrender_cosmic.dll
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            resource: linux-x86_64
            library: libneofontrender_cosmic.so
          - runner: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            resource: linux-aarch64
            library: libneofontrender_cosmic.so
          - runner: macos-13
            target: x86_64-apple-darwin
            resource: macos-x86_64
            library: libneofontrender_cosmic.dylib
          - runner: macos-14
            target: aarch64-apple-darwin
            resource: macos-aarch64
            library: libneofontrender_cosmic.dylib
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust 1.91.1
        uses: dtolnay/rust-toolchain@1.91.1
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux ARM64 linker
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build native library
        shell: bash
        run: |
          if [[ "${{ matrix.target }}" == "aarch64-unknown-linux-gnu" ]]; then
            export CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc
          fi
          cargo build \
            --manifest-path native/cosmic-text/Cargo.toml \
            --release \
            --locked \
            --target "${{ matrix.target }}"
          mkdir -p "dist/${{ matrix.resource }}"
          cp "native/cosmic-text/target/${{ matrix.target }}/release/${{ matrix.library }}" \
            "dist/${{ matrix.resource }}/${{ matrix.library }}"

      - name: Upload native library
        uses: actions/upload-artifact@v4
        with:
          name: cosmic-${{ matrix.resource }}
          # Preserve the platform directory inside each artifact. merge-multiple can then combine
          # same-named .so/.dylib files without overwriting a different architecture.
          path: dist
          if-no-files-found: error
          retention-days: 14

  build:
    name: Package universal mod
    needs: cosmic-native
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Read gradle.properties
        uses: BrycensRanch/read-properties-action@v1
        id: properties
        with:
          file: gradle.properties
          all: true

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'
          cache: gradle

      - name: Download all Cosmic natives
        uses: actions/download-artifact@v4
        with:
          pattern: cosmic-*
          path: cosmic-natives
          merge-multiple: true

      - name: Build universal JAR
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-disabled: false

      - name: Run Gradle build
        run: ./gradlew build -PcosmicNativeBundleDir="${{ github.workspace }}/cosmic-natives"

      - name: Upload universal JAR
        uses: actions/upload-artifact@v4
        with:
          name: neofontrender-universal
          path: build/libs/*.jar
          if-no-files-found: error

      - name: Publish to Maven
        if: github.event_name == 'push' && steps.properties.outputs.publish_to_maven == 'true' && steps.properties.outputs.publish_to_local_maven == 'true'
        run: >-
          ./gradlew publish
          -PcosmicNativeBundleDir="${{ github.workspace }}/cosmic-natives"
          -P${{ steps.properties.outputs.maven_name }}Username=${{ secrets.MAVEN_USER }}
          -P${{ steps.properties.outputs.maven_name }}Password=${{ secrets.MAVEN_PASS }}

      - name: Publish to CurseForge
        if: github.event_name == 'push' && steps.properties.outputs.publish_to_curseforge == 'true'
        env:
          CURSEFORGE_TOKEN: ${{ secrets.CURSEFORGE_TOKEN }}
        run: ./gradlew curseforge -PcosmicNativeBundleDir="${{ github.workspace }}/cosmic-natives"

      - name: Publish to Modrinth
        if: github.event_name == 'push' && steps.properties.outputs.publish_to_modrinth == 'true'
        env:
          MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
        run: ./gradlew modrinth -PcosmicNativeBundleDir="${{ github.workspace }}/cosmic-natives"
